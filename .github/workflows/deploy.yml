name: Deploy Game To ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH
        env:
          ECS_SSH_KEY_B64: ${{ secrets.ECS_SSH_KEY_B64 }}
          ECS_KNOWN_HOSTS: ${{ secrets.ECS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$ECS_SSH_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$ECS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_USER: ${{ secrets.ECS_USER }}
        run: |
          set -euo pipefail
          ssh \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=6 \
            -o TCPKeepAlive=yes \
            -p "$ECS_PORT" \
            "$ECS_USER@$ECS_HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd /root/game

          echo "[deploy] sync code"
          git fetch --all
          git reset --hard origin/main

          echo "[deploy] install deps"
          npm ci --no-audit --no-fund
          echo "[deploy] build"
          npm run build

          echo "[deploy] restart service"
          pm2 restart game
          pm2 save

          echo "[deploy] health check"
          curl -I --max-time 10 http://127.0.0.1:3000
          curl -I --max-time 10 https://chivesgame.com
          REMOTE
